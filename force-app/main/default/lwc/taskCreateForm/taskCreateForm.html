<template>
    <lightning-card title="Create Task" icon-name="utility:edit_form">
        <div class="slds-var-p-around_medium">
            
            <template lwc:if={isStepOne}>
                <lightning-record-edit-form object-api-name="Task" onsuccess={handleSuccess}>
                    <lightning-messages></lightning-messages>
    
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-var-m-bottom_small">
                            <lightning-input-field 
                                field-name="Subject" 
                                required>
                            </lightning-input-field>
                        </div>
    
                        <div class="slds-col slds-size_1-of-2 slds-var-m-bottom_small">
                            <lightning-input-field 
                                field-name="ActivityDate"
                                required>
                            </lightning-input-field>
                        </div>
    
                        <div class="slds-col slds-size_1-of-2 slds-var-m-bottom_small">
                            <lightning-input-field 
                                field-name="Status"
                                required>
                            </lightning-input-field>
                        </div>
    
                        <div class="slds-col slds-size_1-of-1 slds-var-m-bottom_small">
                            <lightning-input-field 
                                field-name="Priority"
                                required>
                            </lightning-input-field>
                        </div>
    
                        <div class="slds-col slds-size_1-of-2 slds-var-m-bottom_small">
                            <lightning-input-field 
                                field-name="WhoId"
                                required>
                            </lightning-input-field>
                        </div>
    
                        <div class="slds-col slds-size_1-of-2 slds-var-m-bottom_small">
                            <lightning-input-field 
                                field-name="WhatId"
                                required>
                            </lightning-input-field>
                        </div>
                    </div>
    
                    <div class="slds-var-m-top_medium slds-text-align_right">
                            <lightning-button 
                                type="submit" 
                                variant="brand" 
                                label="Next" 
                                icon-name="utility:forward">
                            </lightning-button>
                        </div>
                </lightning-record-edit-form>
            </template>

            <template lwc:else>
                <div class="slds-text-align_center slds-var-m-bottom_large">
                    <lightning-icon 
                        icon-name="utility:upload" 
                        size="large" 
                        variant="brand">
                    </lightning-icon>
                    <h2 class="slds-text-heading_medium slds-var-m-top_small">
                        Upload Task Documents
                    </h2>
                    <p class="slds-text-color_weak">
                        Attach any files or images relevant to this newly created task.
                    </p>
                </div>

                <div class="slds-box slds-theme_shade slds-var-m-bottom_medium">
                    <lightning-file-upload
                        label="Add Attachments"
                        name="taskFileUploader"
                        record-id={newTaskId}
                        onuploadfinished={handleUploadFinished}
                        multiple>
                    </lightning-file-upload>
                </div>

                <div class="slds-var-m-top_xlarge slds-text-align_right">
                    <lightning-button 
                        variant="success" 
                        label="Finish Task" 
                        icon-name="utility:check" 
                        onclick={handleFinish}>
                    </lightning-button>
                </div>
            </template>


        </div>
    </lightning-card>
</template>
