<template>
    <lightning-card title="Task List View" icon-name="utility:table">
        <div class="slds-var-p-horizontal_medium slds-var-p-top_medium">
            <lightning-input 
                name="enter-search" 
                label="Search Tasks" 
                type="search"
                placeholder="Type here to search tasks..." 
                onchange={handleSearchChange}>
            </lightning-input>
        </div>

        <div class="slds-var-p-around_medium" style="height: 400px;">
            <lightning-datatable 
                key-field="Id" 
                data={tableData} 
                columns={columns} 
                hide-checkbox-column>
            </lightning-datatable>
        </div>
    </lightning-card>
</template>
